name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test
        run: go test ./... -count=1
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build -buildvcs=false -o agent-vercel ./cmd/agent-vercel
